<!DOCTYPE html>
<html>
<head>
<style>
  body { background: black; color: white; font-size: 150px; font-family: sans-serif; font-weight: 900; }
  .outline-semi {
    -webkit-text-stroke: 3px rgba(255,255,255,0.5);
    color: transparent;
  }
  .outline-solid {
    -webkit-text-stroke: 3px rgba(255,255,255,1);
    color: transparent;
  }
</style>
</head>
<body>
  <div class="outline-semi">FILMS</div>
  <div class="outline-solid">FILMS</div>
</body>
</html>
