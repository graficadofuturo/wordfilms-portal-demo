<!DOCTYPE html>
<html>
<head>
<style>
  body { background: url('https://picsum.photos/800/600'); background-size: cover; color: white; font-size: 150px; font-family: sans-serif; font-weight: 900; }
  .outline-ds {
    color: black;
    mix-blend-mode: screen;
    filter: 
      drop-shadow(-2px -2px 0 white)
      drop-shadow(2px -2px 0 white)
      drop-shadow(-2px 2px 0 white)
      drop-shadow(2px 2px 0 white);
  }
</style>
</head>
<body>
  <div class="outline-ds">FILMS</div>
</body>
</html>
