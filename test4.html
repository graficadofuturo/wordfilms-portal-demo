<!DOCTYPE html>
<html>
<head>
<style>
  body { background: url('https://picsum.photos/800/600'); background-size: cover; color: white; font-family: sans-serif; }
</style>
</head>
<body>
  <svg width="100%" height="200">
    <defs>
      <mask id="text-mask">
        <rect width="100%" height="100%" fill="white" />
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="150" font-weight="900" fill="black">FILMS</text>
      </mask>
    </defs>
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="150" font-weight="900" fill="white" stroke="white" stroke-width="6" mask="url(#text-mask)">FILMS</text>
  </svg>
</body>
</html>
